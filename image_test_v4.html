<!DOCTYPE html>
<html lang="ja">
<head><meta charset="utf-8"><title>画像テスト v4 (imgタグGETのみ)</title></head>
<body style="font-family:sans-serif; padding:20px;">
<h2>画像テスト v4 - imgタグGETのみ</h2>
<hr>

<h3>1: picsum.photos (確認済み✅)</h3>
<div id="s1">⏳</div>
<img id="i1" width="300" style="border:1px solid #ccc;display:none" />

<h3>2: Lorem Flickr</h3>
<div id="s2">⏳</div>
<img id="i2" width="300" style="border:1px solid #ccc;display:none" />

<h3>3: Placeholder.com</h3>
<div id="s3">⏳</div>
<img id="i3" width="300" style="border:1px solid #ccc;display:none" />

<h3>4: ThisPersonDoesNotExist (AI生成顔)</h3>
<div id="s4">⏳</div>
<img id="i4" width="300" style="border:1px solid #ccc;display:none" />

<h3>5: Lexica.art (AI画像検索)</h3>
<div id="s5">⏳</div>
<img id="i5" width="300" style="border:1px solid #ccc;display:none" />

<h3>6: Pixabay ダイレクトリンク</h3>
<div id="s6">⏳</div>
<img id="i6" width="300" style="border:1px solid #ccc;display:none" />

<script>
function test(id, url) {
  var img = document.getElementById('i' + id);
  var s = document.getElementById('s' + id);
  var t = setTimeout(function() { s.textContent = '❌ タイムアウト'; }, 30000);
  img.onload = function() { clearTimeout(t); s.textContent = '✅ 成功 (' + img.naturalWidth + 'x' + img.naturalHeight + ')'; img.style.display = 'block'; };
  img.onerror = function() { clearTimeout(t); s.textContent = '❌ 失敗'; };
  img.crossOrigin = 'anonymous';
  img.src = url;
}

test(1, 'https://picsum.photos/512/384?random=1');
test(2, 'https://loremflickr.com/512/384/dark,mansion');
test(3, 'https://via.placeholder.com/512x384/1a1a2e/ffffff?text=Murder+Mystery');
test(4, 'https://thispersondoesnotexist.com/');
test(5, 'https://lexica.art/api/v1/search?q=dark+mysterious+mansion+night');
test(6, 'https://cdn.pixabay.com/photo/2016/11/18/17/46/house-1835464_640.jpg');

// テスト5はJSONなのでfetchで処理
(async function() {
  var s = document.getElementById('s5');
  try {
    var res = await fetch('https://lexica.art/api/v1/search?q=dark+mysterious+mansion');
    if (!res.ok) { s.textContent = '❌ Lexica HTTP ' + res.status; return; }
    var data = await res.json();
    if (data.images && data.images.length > 0) {
      document.getElementById('i5').src = data.images[0].src;
      document.getElementById('i5').style.display = 'block';
      s.textContent = '✅ Lexica成功! ' + data.images.length + '件';
    } else {
      s.textContent = '❌ Lexica 画像なし';
    }
  } catch(e) {
    s.textContent = '❌ Lexica例外: ' + e.message;
  }
})();
</script>
</body>
</html>
