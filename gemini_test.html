<!DOCTYPE html>
<html lang="ja">
<head><meta charset="utf-8"><title>Gemini画像生成 429エラー詳細確認</title></head>
<body style="font-family:sans-serif; padding:20px;">
<h2>Gemini 画像生成API エラー詳細確認</h2>
<p>新しいアカウントのAPIキーを入力して「テスト」を押してください。</p>

<div style="margin:20px 0;">
  <label>APIキー: </label>
  <input type="text" id="apiKey" placeholder="AIzaSy..." style="width:400px; padding:6px; font-family:monospace;" />
  <button id="btnTest" style="padding:6px 16px; margin-left:8px;">テスト実行</button>
</div>

<div id="result" style="white-space:pre-wrap; background:#f5f5f5; padding:16px; border-radius:8px; font-size:12px; max-height:600px; overflow:auto;"></div>

<script>
document.getElementById('btnTest').addEventListener('click', async function() {
  var key = document.getElementById('apiKey').value.trim();
  if (!key) { alert('APIキーを入力してください'); return; }
  var out = document.getElementById('result');
  out.textContent = 'テスト実行中...\n';

  var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key=' + encodeURIComponent(key);

  try {
    out.textContent += '\n--- リクエスト送信 ---\n';
    out.textContent += 'URL: ' + url.replace(key, 'API_KEY_HIDDEN') + '\n';

    var res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: 'Generate an image of a cat' }] }],
        generationConfig: { responseModalities: ['IMAGE', 'TEXT'] }
      })
    });

    out.textContent += '\n--- レスポンス ---\n';
    out.textContent += 'HTTP Status: ' + res.status + ' ' + res.statusText + '\n';

    // レスポンスヘッダーを表示
    out.textContent += '\nHeaders:\n';
    res.headers.forEach(function(value, name) {
      out.textContent += '  ' + name + ': ' + value + '\n';
    });

    // レスポンス本文を表示
    var bodyText = await res.text();
    out.textContent += '\nBody:\n' + bodyText + '\n';

    // JSONパースして見やすく
    try {
      var json = JSON.parse(bodyText);
      out.textContent += '\n--- パース済み ---\n' + JSON.stringify(json, null, 2) + '\n';
    } catch(e) {}

  } catch(e) {
    out.textContent += '\n--- 例外 ---\n' + e.message + '\n';
  }
});
</script>
</body>
</html>
